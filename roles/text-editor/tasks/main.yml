---
- name: "Install VIM (Debian)"
  apt:
    name: vim
    state: latest
  become: yes
  when: ansible_facts['os_family'] == "Debian"

- name: "Install VIM (RHEL)"
  yum:
    name: vim
    state: latest
  become: yes
  when: ansible_facts['os_family'] == "RedHat"

- name: "Cloning config files from github"
  git: 
    repo: "{{ config_repo }}" 
    dest: "/tmp/{{ config_repo }}"
    clone: yes

- name: "Move .vimrc"
  copy:
    src: "/tmp/{{ config_repo }}/.vimrc"
    dest: "/home/{{ user }}/"
  become: yes

- name: "Delete config repo"
  file: 
    path: "/tmp/{{ config_repo }}" 
    state: absent
